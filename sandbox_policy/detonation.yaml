# Sentinel sandbox policy — Docker enforcement flags
#
# Every detonation run in agents/executor.py applies these constraints:
#
#   --network none
#       Default-deny all outbound connections at the kernel level.
#       Any C2 beacon attempt gets ENETUNREACH / ECONNREFUSED.
#
#   --read-only
#       Container root filesystem is immutable.
#       Malware cannot modify system files.
#
#   --tmpfs /tmp:rw,noexec,nosuid,size=64m
#       Writable scratch space capped at 64 MB, non-executable, dropped on exit.
#       Persistence drops land here and disappear when the container exits.
#
#   --cap-drop ALL
#       All Linux capabilities stripped. No privilege escalation possible.
#
#   --security-opt no-new-privileges
#       Prevents setuid/setgid binaries from gaining privileges.
#
#   --rm
#       Container and its filesystem are destroyed after the run.

image: python:3.11-slim

network: none

filesystem:
  read_only: true
  tmpfs:
    - path: /tmp
      options: rw,noexec,nosuid,size=64m

capabilities:
  drop: ALL

security:
  no_new_privileges: true
